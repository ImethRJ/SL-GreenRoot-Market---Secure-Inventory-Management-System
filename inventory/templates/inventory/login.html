{% extends 'inventory/base.html' %}

{% block title %}Log In - SL-GreenRoot Market{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12">
    <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden transform transition duration-300 hover:shadow-2xl">
        <div class="bg-emerald-800 px-6 py-8 text-center text-white">
            <h2 class="text-2xl font-bold tracking-tight">Staff Portal</h2>
            <p class="text-emerald-100 text-sm mt-1">Please sign in to access the system</p>
        </div>
        
        <form method="post" action="{% url 'login' %}" class="p-8 space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-4 bg-rose-50 border border-rose-200 text-rose-800 text-sm rounded-lg">
                    <p class="font-semibold">Invalid username or password. Please try again.</p>
                </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                <input type="text" name="username" autofocus required id="id_username" 
                       class="w-full px-4 py-3 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition bg-slate-50"
                       placeholder="Enter your username">
            </div>

            <div>
                <label for="id_password" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                <input type="password" name="password" required id="id_password" 
                       class="w-full px-4 py-3 border border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition bg-slate-50"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full bg-gradient-to-r from-emerald-700 to-emerald-600 hover:from-emerald-800 hover:to-emerald-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-150 shadow-lg shadow-emerald-700/20 transform hover:-translate-y-[1px]">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
